apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-crud
  namespace: crud-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodejs-crud
  template:
    metadata:
      labels:
        app: nodejs-crud
      annotations:
        ad.datadoghq.com/nodejs-crud.logs: '[{"source":"nodejs","service":"nodejs-crud"}]'
    spec:
      containers:
        - name: nodejs-crud
          image: docker-nodejs-crud:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_SERVICE
              value: nodejs-crud
            - name: DD_ENV
              value: kubernetes
            - name: DD_VERSION
              value: "1.0.0"
            - name: DD_LOGS_INJECTION
              value: "true"
            - name: DD_RUNTIME_METRICS_ENABLED
              value: "true"
            - name: DD_PROFILING_ENABLED
              value: "true"
            - name: DD_APPSEC_ENABLED
              value: "true"
            - name: DD_DBM_PROPAGATION_MODE
              value: full
            - name: DATABASE_URL
              value: postgresql://user:password@postgres:5432/crud_db
            - name: PORT
              value: "3000"
---
apiVersion: v1
kind: Service
metadata:
  name: nodejs-crud
  namespace: crud-app
spec:
  type: NodePort
  selector:
    app: nodejs-crud
  ports:
    - port: 3000
      nodePort: 30002
