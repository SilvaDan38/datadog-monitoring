apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruby-crud
  namespace: crud-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ruby-crud
  template:
    metadata:
      labels:
        app: ruby-crud
      annotations:
        ad.datadoghq.com/ruby-crud.logs: '[{"source":"ruby","service":"ruby-crud"}]'
    spec:
      containers:
        - name: ruby-crud
          image: docker-ruby-crud:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 4567
          env:
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_SERVICE
              value: ruby-crud
            - name: DD_ENV
              value: kubernetes
            - name: DD_VERSION
              value: "1.0.0"
            - name: DD_LOGS_INJECTION
              value: "true"
            - name: DD_RUNTIME_METRICS_ENABLED
              value: "true"
            - name: DD_PROFILING_ENABLED
              value: "true"
            - name: DD_APPSEC_ENABLED
              value: "true"
            - name: DATABASE_URL
              value: postgresql://user:password@postgres:5432/crud_db
---
apiVersion: v1
kind: Service
metadata:
  name: ruby-crud
  namespace: crud-app
spec:
  type: NodePort
  selector:
    app: ruby-crud
  ports:
    - port: 4567
      nodePort: 30005
