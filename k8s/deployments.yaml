            httpGet: { path: /health, port: 3000 }
---
apiVersion: v1
kind: Service
metadata:
  name: nodejs-crud
  namespace: datadog-monitoring
spec:
  selector: { app: nodejs-crud }
  ports: [{ port: 80, targetPort: 3000 }]

