        tags.datadoghq.com/service: ruby-crud
        tags.datadoghq.com/version: "1.0.0"
      annotations:
        ad.datadoghq.com/ruby-crud.logs: '[{"source":"ruby","service":"ruby-crud"}]'
    spec:
      containers:
        - name: ruby-crud
          image: ruby-crud:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4567
          env:
            - { name: DD_SERVICE, value: ruby-crud }
            - { name: DD_ENV,     value: kubernetes }
            - { name: DD_VERSION, value: "1.0.0" }
            - { name: DD_AGENT_HOST,
                valueFrom: { fieldRef: { fieldPath: status.hostIP } } }
            - { name: DD_PROFILING_ENABLED,     value: "true" }
            - { name: DD_DBM_PROPAGATION_MODE,  value: full }
            - { name: DD_APPSEC_ENABLED,        value: "true" }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: ruby-crud
  namespace: datadog-monitoring
spec:
  selector: { app: ruby-crud }
  ports: [{ port: 80, targetPort: 4567 }]

---
# ─── Ingress — expõe todos os serviços ───────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crud-ingress
  namespace: datadog-monitoring
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /python
            pathType: Prefix
            backend:
              service: { name: python-crud, port: { number: 80 } }
          - path: /nodejs
            pathType: Prefix
            backend:
              service: { name: nodejs-crud, port: { number: 80 } }
          - path: /java
            pathType: Prefix
            backend:
              service: { name: java-crud, port: { number: 80 } }
          - path: /dotnet
            pathType: Prefix
            backend:
              service: { name: dotnet-crud, port: { number: 80 } }
          - path: /ruby
            pathType: Prefix
            backend:
              service: { name: ruby-crud, port: { number: 80 } }
