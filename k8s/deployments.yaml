---
# ─── .NET CRUD ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-crud
  namespace: datadog-monitoring
spec:
  replicas: 2
  selector:
    matchLabels: { app: dotnet-crud }
  template:
    metadata:
      labels:
        app: dotnet-crud
        tags.datadoghq.com/env:     kubernetes
        tags.datadoghq.com/service: dotnet-crud
        tags.datadoghq.com/version: "1.0.0"
      annotations:
        ad.datadoghq.com/dotnet-crud.logs: '[{"source":"dotnet","service":"dotnet-crud"}]'
    spec:
      containers:
        - name: dotnet-crud
          image: dotnet-crud:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - { name: DD_SERVICE, value: dotnet-crud }
            - { name: DD_ENV,     value: kubernetes }
            - { name: DD_VERSION, value: "1.0.0" }
            - { name: DD_AGENT_HOST,
                valueFrom: { fieldRef: { fieldPath: status.hostIP } } }
            - { name: CORECLR_ENABLE_PROFILING, value: "1" }
            - { name: CORECLR_PROFILER,
                value: "{846F5F1C-F9AE-4B07-969E-05C26BC060D8}" }
            - { name: CORECLR_PROFILER_PATH,
                value: /opt/datadog/Datadog.Trace.ClrProfiler.Native.so }
            - { name: DD_DOTNET_TRACER_HOME,    value: /opt/datadog }
            - { name: DD_DBM_PROPAGATION_MODE,  value: full }
            - { name: DD_APPSEC_ENABLED,        value: "true" }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: dotnet-crud
  namespace: datadog-monitoring
spec:
  selector: { app: dotnet-crud }
  ports: [{ port: 80, targetPort: 8080 }]

---
