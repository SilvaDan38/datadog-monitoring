---
# deployments.yaml — todos os serviços CRUD no Kubernetes
# O Datadog Admission Controller injeta automaticamente as variáveis DD_*
# se o namespace tiver: admission.datadoghq.com/enabled: "true"

# ─── PostgreSQL ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: datadog-monitoring
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels:
        app: postgres
        tags.datadoghq.com/env:     kubernetes
        tags.datadoghq.com/service: postgresql
        tags.datadoghq.com/version: "16"
      annotations:
        # DBM — autodiscovery para o agente
        ad.datadoghq.com/postgres.checks: |
          {
            "postgres": {
              "init_config": {},
              "instances": [{
                "host": "%%host%%",
                "port": "5432",
                "username": "user",
                "password": "password",
                "dbname": "crud_db",
                "collect_activity_metrics": true,
                "collect_database_size_metrics": true
              }]
            }
          }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_DB,       value: crud_db }
            - { name: POSTGRES_USER,     value: user }
            - { name: POSTGRES_PASSWORD, value: password }
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pg-data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: datadog-monitoring
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: datadog-monitoring
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432

---
# ─── Python CRUD ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-crud
  namespace: datadog-monitoring
spec:
  replicas: 2
  selector:
    matchLabels: { app: python-crud }
  template:
    metadata:
      labels:
        app: python-crud
        # Tags unificadas Datadog
        tags.datadoghq.com/env:     kubernetes
        tags.datadoghq.com/service: python-crud
        tags.datadoghq.com/version: "1.0.0"
      annotations:
        ad.datadoghq.com/python-crud.logs: '[{"source":"python","service":"python-crud"}]'
    spec:
      containers:
        - name: python-crud
          image: python-crud:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - { name: DATABASE_URL, value: postgresql://user:password@postgres:5432/crud_db }
            - { name: DD_SERVICE,   value: python-crud }
            - { name: DD_ENV,       value: kubernetes }
            - { name: DD_VERSION,   value: "1.0.0" }
            - { name: DD_AGENT_HOST,
                valueFrom: { fieldRef: { fieldPath: status.hostIP } } }
            - { name: DD_TRACE_AGENT_PORT,        value: "8126" }
            - { name: DD_LOGS_INJECTION,           value: "true" }
            - { name: DD_PROFILING_ENABLED,        value: "true" }
            - { name: DD_RUNTIME_METRICS_ENABLED,  value: "true" }
            - { name: DD_DBM_PROPAGATION_MODE,     value: full }
            - { name: DD_APPSEC_ENABLED,           value: "true" }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: python-crud
  namespace: datadog-monitoring
spec:
  selector: { app: python-crud }
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP

---
