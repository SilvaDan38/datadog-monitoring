services:
  # --- Banco de Dados PostgreSQL ---
  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=crud_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d crud_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Sua Aplicação .NET ---
  app:
    build: .
    container_name: dotnet-crud-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=Host=db;Database=crud_db;Username=user;Password=password
      # Configuração para falar com o Agent local (Host)
      - DD_AGENT_HOST=host.docker.internal 
      - DD_LOGS_INJECTION=true
      - DD_PROFILING_ENABLED=true
    ports:
      - "8080:8080"